<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RaoOS">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F4F5F3">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0F151C">
<title>RaoOS</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F5F3; --surface:#FFFFFF; --surface2:#EDEFEC; --ink:#1C2733; --muted:#5C6B7A;
  --line:#E0E4E1; --accent:#0E7A6F; --accent-soft:#E3F0EE; --on-accent:#FFFFFF;
  --amber:#B45309; --amber-soft:#F6EADB; --good:#3E8E5A; --bad:#B03A2E;
  --shadow:0 1px 2px rgba(28,39,51,.06), 0 4px 16px rgba(28,39,51,.05);
  --radius:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0F151C; --surface:#171F28; --surface2:#1F2935; --ink:#E6EAEE; --muted:#93A1AE;
    --line:#26303A; --accent:#3AB3A5; --accent-soft:#153029; --on-accent:#08211D;
    --amber:#E5A158; --amber-soft:#33261A; --good:#5CB380; --bad:#D9705F;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box; margin:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'IBM Plex Sans',-apple-system,system-ui,sans-serif;
  font-size:15.5px; line-height:1.5; min-height:100dvh;
}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0}
input,select,textarea{
  font:inherit; color:var(--ink); background:var(--surface); border:1px solid var(--line);
  border-radius:10px; padding:9px 12px; width:100%;
}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
textarea{resize:vertical; min-height:84px}
a{color:var(--accent)}
.mono{font-family:'IBM Plex Mono',monospace}
.serif{font-family:'IBM Plex Serif',Georgia,serif}

/* Shell */
#shell{display:none; min-height:100dvh}
#shell.on{display:block}
.wrap{max-width:960px; margin:0 auto; padding:0 16px 96px}
@media(min-width:900px){
  .wrap{padding-left:196px; padding-bottom:32px}
}
header.app{padding:calc(14px + env(safe-area-inset-top)) 0 6px}
header.app .kicker{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
header.app h1{font-size:24px; font-weight:700; letter-spacing:-.01em; display:flex; align-items:center; gap:10px}
header.app .gear{margin-left:auto; color:var(--muted); padding:6px}

/* Nav */
nav#nav{
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:var(--surface); border-top:1px solid var(--line);
  display:flex; justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav#nav button{
  display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:10.5px; color:var(--muted); min-width:52px; padding:4px 2px; border-radius:10px;
}
nav#nav button.on{color:var(--accent); font-weight:600}
nav#nav svg{width:22px; height:22px}
@media(min-width:900px){
  nav#nav{
    top:0; bottom:0; right:auto; width:180px; flex-direction:column; justify-content:flex-start;
    gap:4px; padding:24px 12px; border-top:none; border-right:1px solid var(--line);
  }
  nav#nav button{flex-direction:row; gap:10px; font-size:14px; padding:10px 12px; width:100%; justify-content:flex-start}
  nav#nav .brand{display:block !important; font-weight:700; font-size:16px; padding:0 12px 18px; color:var(--ink)}
}
nav#nav .brand{display:none}

/* Cards & bits */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin:14px 0}
.card h2{font-size:13px; font-family:'IBM Plex Mono',monospace; font-weight:500; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:8px}
.card h2 .spacer{margin-left:auto}
.row{display:flex; align-items:center; gap:10px}
.chip{font-size:11.5px; font-family:'IBM Plex Mono',monospace; padding:2px 8px; border-radius:999px; background:var(--surface2); color:var(--muted); white-space:nowrap}
.chip.accent{background:var(--accent-soft); color:var(--accent)}
.chip.amber{background:var(--amber-soft); color:var(--amber)}
.btn{background:var(--accent); color:var(--on-accent); font-weight:600; border-radius:10px; padding:9px 16px}
.btn.ghost{background:var(--surface2); color:var(--ink); font-weight:500}
.btn.small{padding:6px 12px; font-size:13.5px}
.btn:disabled{opacity:.5}
.muted{color:var(--muted)}
.small{font-size:13px}
.empty{color:var(--muted); font-size:14px; padding:8px 0}
hr.sep{border:none; border-top:1px solid var(--line); margin:12px 0}

/* Tasks */
.task{display:flex; align-items:flex-start; gap:11px; padding:9px 0; border-bottom:1px solid var(--line)}
.task:last-child{border-bottom:none}
.task .box{
  flex:none; width:21px; height:21px; margin-top:2px; border:2px solid var(--muted);
  border-radius:7px; display:grid; place-items:center; color:transparent; transition:all .15s;
}
.task.done .box{background:var(--good); border-color:var(--good); color:#fff}
.task.done .t{text-decoration:line-through; color:var(--muted)}
.task .t{flex:1; min-width:0}
.task .meta{display:flex; gap:6px; flex-wrap:wrap; margin-top:2px}
.task .p1{color:var(--amber); font-weight:600}
.overdue{color:var(--bad); font-weight:600}

/* Brief */
.brief{font-family:'IBM Plex Serif',Georgia,serif; font-size:16px; line-height:1.65}
.brief h3{font-family:'IBM Plex Sans',sans-serif; font-size:15px; margin:14px 0 4px}
.brief h3:first-child{margin-top:0}
.brief ul{padding-left:20px; margin:4px 0}
.brief p{margin:8px 0}
.sched{display:grid; grid-template-columns:auto 1fr; gap:4px 12px}
.sched .tm{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--muted); padding-top:2px; white-space:nowrap}

/* Login */
#login{min-height:100dvh; display:grid; place-items:center; padding:20px}
#login .card{max-width:380px; width:100%; margin:0}
#login h1{font-size:26px; margin-bottom:2px}
#login .sub{color:var(--muted); margin-bottom:18px}
#login label{font-size:13px; color:var(--muted); display:block; margin:12px 0 4px}

/* Modal */
#modal-bg{position:fixed; inset:0; background:rgba(10,15,20,.45); z-index:60; display:none; align-items:flex-end; justify-content:center}
@media(min-width:640px){#modal-bg{align-items:center}}
#modal-bg.on{display:flex}
#modal{background:var(--surface); border-radius:18px 18px 0 0; width:100%; max-width:520px; max-height:88dvh; overflow-y:auto; padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
@media(min-width:640px){#modal{border-radius:18px}}
#modal h3{margin-bottom:12px}
#modal label{font-size:13px; color:var(--muted); display:block; margin:12px 0 4px}

/* Toast */
#toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(84px + env(safe-area-inset-bottom)); background:var(--ink); color:var(--bg); padding:10px 18px; border-radius:999px; font-size:14px; z-index:80; opacity:0; transition:opacity .25s; pointer-events:none; max-width:88vw; text-align:center}
#toast.on{opacity:1}
@media(min-width:900px){#toast{bottom:32px}}

/* Voice capture */
#fab{position:fixed; right:16px; bottom:calc(78px + env(safe-area-inset-bottom)); z-index:50; width:56px; height:56px; border-radius:50%; background:var(--accent); color:var(--on-accent); box-shadow:0 4px 14px rgba(10,15,20,.3); display:grid; place-items:center}
#fab svg{width:26px; height:26px}
@media(min-width:900px){#fab{bottom:28px; right:28px}}
#mic-big{width:84px; height:84px; border-radius:50%; background:var(--accent-soft); color:var(--accent); display:grid; place-items:center; margin:10px auto; border:2px solid var(--accent)}
#mic-big.listening{background:var(--accent); color:var(--on-accent); animation:micpulse 1.6s infinite}
#mic-big:disabled{opacity:.4}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(14,122,111,.4)}70%{box-shadow:0 0 0 16px rgba(14,122,111,0)}100%{box-shadow:0 0 0 0 rgba(14,122,111,0)}}
@media (prefers-reduced-motion: reduce){#mic-big.listening{animation:none}}

/* Mood + breathing */
.mood{display:flex; gap:8px}
.mood button{width:38px; height:38px; border-radius:50%; background:var(--surface2); font-size:17px; display:grid; place-items:center; border:2px solid transparent}
.mood button.on{border-color:var(--accent); background:var(--accent-soft)}
#breath-circle{
  width:140px; height:140px; border-radius:50%; margin:14px auto; display:grid; place-items:center;
  background:var(--accent-soft); color:var(--accent); font-weight:600; transition:transform 3.8s ease-in-out;
}
@media (prefers-reduced-motion: reduce){ #breath-circle{transition:none} }

.goal{padding:10px 0; border-bottom:1px solid var(--line)}
.goal:last-child{border-bottom:none}
.goal .head{display:flex; gap:8px; align-items:baseline; cursor:pointer}
.goal .edit{display:none; margin-top:10px}
.goal.open .edit{display:block}

.proj{display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--line); cursor:pointer; width:100%; text-align:left}
.proj:last-child{border-bottom:none}
.proj .dot{width:10px; height:10px; border-radius:50%; flex:none}
.proj .n{flex:1; font-weight:500}

.note{padding:12px 0; border-bottom:1px solid var(--line)}
.note:last-child{border-bottom:none}
.note.new{border-left:3px solid var(--accent); padding-left:10px}
.note .body{font-family:'IBM Plex Serif',Georgia,serif; line-height:1.6}
.note .body ul{padding-left:20px}

.qbtns{display:flex; gap:8px; flex-wrap:wrap}
.addrow{display:flex; gap:8px; margin-top:10px}
.addrow input{flex:1}
.addrow select{width:auto; max-width:40%}

.onb-q{margin-bottom:16px}
.onb-q .q{font-weight:600; margin-bottom:6px}

table.h7{width:100%; border-collapse:collapse; font-size:13.5px; font-variant-numeric:tabular-nums}
table.h7 th{font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); text-align:left; padding:4px 8px 4px 0; font-weight:500}
table.h7 td{padding:5px 8px 5px 0; border-top:1px solid var(--line)}

/* ============ RaoOS design v2 — brand layer ============ */
:root{
  --bg:#EEF1F7; --surface:#FFFFFF; --surface2:#E9EDF5; --ink:#17224D; --muted:#5B6683;
  --line:#DDE3F0; --accent:#0B8377; --accent-soft:#DCF1EE; --on-accent:#FFFFFF;
  --accent2:#2F6BEB; --accent3:#8B96F0;
  --amber:#B45309; --amber-soft:#F7ECDD; --good:#2E8B57; --bad:#B03A2E;
  --hero1:#17224D; --hero2:#22347C;
  --shadow:0 1px 2px rgba(23,34,77,.05), 0 8px 28px rgba(23,34,77,.07);
  --radius:18px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0A0F1F; --surface:#131A2C; --surface2:#1C2438; --ink:#E8EBF5; --muted:#96A1BE;
    --line:#25304A; --accent:#31C4B4; --accent-soft:#102B31; --on-accent:#04211D;
    --accent2:#6E97F5; --accent3:#9BA6F5;
    --amber:#E2A45C; --amber-soft:#312616; --good:#5CB380; --bad:#D9705F;
    --hero1:#1A2340; --hero2:#253465;
    --shadow:0 1px 2px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.3);
  }
}
body::before{
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(520px 340px at 12% -4%, rgba(20,178,166,.13), transparent 65%),
    radial-gradient(560px 380px at 88% -6%, rgba(120,134,246,.12), transparent 65%),
    var(--bg);
}
body{background:transparent}
.card{border-radius:var(--radius)}
.card h2{display:flex; align-items:center; gap:8px}
.card h2::before{
  content:''; flex:none; width:24px; height:8px;
  background:
    radial-gradient(circle at 4px 4px, var(--accent) 0 2.7px, transparent 3.1px),
    radial-gradient(circle at 12px 4px, var(--accent2) 0 2.7px, transparent 3.1px),
    radial-gradient(circle at 20px 4px, var(--accent3) 0 2.7px, transparent 3.1px);
}
.btn{background:linear-gradient(135deg,#12A797,#2F6BEB); border-radius:12px; color:#fff; box-shadow:0 3px 10px rgba(31,90,180,.28)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--surface2); color:var(--ink); box-shadow:none}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent2); outline-offset:2px}
.chip{border-radius:8px}
#fab{background:linear-gradient(135deg,#12A797,#2F6BEB); box-shadow:0 6px 20px rgba(18,140,160,.45)}

/* Floating dock nav (mobile) */
nav#nav{
  left:10px; right:10px; bottom:calc(8px + env(safe-area-inset-bottom));
  border:1px solid var(--line); border-top:1px solid var(--line);
  border-radius:20px; padding:6px 4px;
  background:rgba(255,255,255,.86);
  -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
  box-shadow:0 8px 30px rgba(23,34,77,.16);
}
@media (prefers-color-scheme: dark){ nav#nav{background:rgba(19,26,44,.86)} }
nav#nav button{border-radius:12px; padding:6px 4px}
nav#nav button.on{background:var(--accent-soft); color:var(--accent)}
.wrap{padding-bottom:110px}
#toast{bottom:calc(96px + env(safe-area-inset-bottom))}
@media(min-width:900px){
  nav#nav{top:0; bottom:0; left:0; right:auto; border-radius:0; border:none; border-right:1px solid var(--line); box-shadow:none; background:var(--surface); -webkit-backdrop-filter:none; backdrop-filter:none; padding:24px 12px}
  nav#nav button{border-radius:12px; padding:10px 12px}
  .wrap{padding-bottom:40px}
  #toast{bottom:32px}
}

/* Hero: greeting + capture hub */
.card.hero{
  background:linear-gradient(150deg, var(--hero1), var(--hero2));
  border:none; color:#EDF1FF; overflow:hidden; position:relative;
}
.card.hero::after{
  content:''; position:absolute; right:-40px; top:-52px; width:190px; height:190px; border-radius:50%;
  border:22px solid rgba(46,199,184,.16); pointer-events:none;
}
.hero .kick{font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:#7FD9CE; margin-bottom:2px}
.hero .greet{font-size:23px; font-weight:700; letter-spacing:-.01em; margin-bottom:10px}
.hero .stats{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; position:relative; z-index:1}
.hero .stat{font-size:12.5px; background:rgba(255,255,255,.12); border-radius:999px; padding:4px 11px; color:#D8E0F5}
.hero .stat strong{color:#fff; font-variant-numeric:tabular-nums}
.hero .seg{display:flex; background:rgba(255,255,255,.13); border-radius:13px; padding:3px; margin-bottom:10px; position:relative; z-index:1}
.hero .seg button{flex:1; padding:8px 6px; border-radius:10px; color:rgba(240,244,255,.72); font-size:14px; font-weight:500}
.hero .seg button.on{background:#fff; color:var(--hero1); font-weight:600}
.hero input,.hero select,.hero textarea{background:#fff; color:#17224D; border:none}
.hero input::placeholder,.hero textarea::placeholder{color:#7B86A6}
.hero .addrow{margin-top:8px}
.hero textarea{min-height:72px; margin-top:8px}
.hero .btn{box-shadow:0 3px 12px rgba(0,0,0,.25)}

/* Tappable task rows */
.task.tappable{cursor:pointer; border-radius:10px; padding-left:8px; padding-right:8px; margin-left:-8px; margin-right:-8px; -webkit-tap-highlight-color:transparent}
@media(hover:hover){ .task.tappable:hover{background:var(--surface2)} }
.task.tappable:focus-visible{outline:2px solid var(--accent2); outline-offset:-2px}
.task.tappable:active{background:var(--surface2)}
.task .box{width:24px; height:24px; border-radius:8px; display:grid; place-items:center}

/* Health metric tiles + sparklines */
.mtiles{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
@media(min-width:560px){.mtiles{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.mtiles{grid-template-columns:repeat(4,1fr)}}
.mtile{background:var(--surface2); border:1px solid var(--line); border-radius:14px; padding:10px 11px 8px}
.mtile .lab{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted)}
.mtile .val{font-size:22px; font-weight:700; letter-spacing:-.02em; line-height:1.1; margin-top:1px; font-variant-numeric:tabular-nums}
.mtile .val .u{font-size:12px; font-weight:500; color:var(--muted); margin-left:2px}
.mtile .spark{margin:5px 0 3px; height:32px}
.mtile .sub{font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px; font-variant-numeric:tabular-nums}
.mtile .delta{font-weight:600}
.mtile .delta.good{color:var(--good)} .mtile .delta.bad{color:var(--bad)} .mtile .delta.flat{color:var(--muted)}
.analysis{display:grid; gap:12px}
@media(min-width:720px){.analysis{grid-template-columns:1fr 1fr}}
.analysis .blk{background:var(--surface2); border-radius:14px; padding:13px 15px}
.analysis .blk h4{font-size:12px; font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); margin-bottom:6px; display:flex; gap:8px; align-items:baseline}
.analysis .blk h4 .rng{color:var(--muted); font-size:10.5px; margin-left:auto; letter-spacing:0}
.analysis .body{font-family:'IBM Plex Serif',Georgia,serif; font-size:14.5px; line-height:1.6}
.analysis .body strong{font-family:'IBM Plex Sans',sans-serif}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <img src="wordmark.png" alt="RaoOS" style="width:210px; max-width:75%; display:block; margin-bottom:8px; background:#fff; padding:8px 12px; border-radius:10px">
    <div class="sub">Your projects, health, family & focus — managed with Claude.</div>
    <label for="li-email">Email</label>
    <input id="li-email" type="email" value="rhetorrao@gmail.com" autocomplete="username">
    <label for="li-pass">Password</label>
    <input id="li-pass" type="password" autocomplete="current-password">
    <div id="li-err" class="small" style="color:var(--bad); margin-top:8px"></div>
    <button class="btn" id="li-btn" style="width:100%; margin-top:16px">Sign in</button>
  </div>
</div>

<div id="shell">
  <button id="fab" aria-label="Voice capture" title="Voice capture">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a4 4 0 0 0 4-4V6a4 4 0 1 0-8 0v5a4 4 0 0 0 4 4z"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3M9 21h6"/></svg>
  </button>
  <nav id="nav">
    <div class="brand"><img src="wordmark.png" alt="RaoOS" style="width:130px; display:block; background:#fff; padding:6px 9px; border-radius:9px"></div>
  </nav>
  <div class="wrap">
    <header class="app">
      <div class="kicker" id="hdr-date"></div>
      <h1><span id="hdr-title">Today</span>
        <button class="gear" id="gear" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

// Minimal markdown renderer (escapes first; supports #/##/###, **bold**, *em*, - lists)
function md(src){
  if(!src) return '';
  const inline = s => esc(s)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:!?]|$)/g,'$1<em>$2</em>');
  const lines = src.split(/\r?\n/); let out=[], list=false, para=[];
  const flushP = () => { if(para.length){ out.push('<p>'+para.join('<br>')+'</p>'); para=[]; } };
  const flushL = () => { if(list){ out.push('</ul>'); list=false; } };
  for(const raw of lines){
    const l = raw.trimEnd();
    const h = l.match(/^(#{1,4})\s+(.*)/);
    if(h){ flushP(); flushL(); out.push('<h3>'+inline(h[2])+'</h3>'); continue; }
    if(/^[-*]\s+/.test(l)){ flushP(); if(!list){ out.push('<ul>'); list=true; } out.push('<li>'+inline(l.replace(/^[-*]\s+/,''))+'</li>'); continue; }
    if(l===''){ flushP(); flushL(); continue; }
    para.push(inline(l));
  }
  flushP(); flushL();
  return out.join('');
}

function taskRow(t, showProj=true){
  const div=document.createElement('div');
  div.className='task tappable'+(t.status==='done'?' done':'');
  div.setAttribute('role','button'); div.tabIndex=0;
  div.setAttribute('aria-label','Toggle done: '+t.title);
  const over = t.due_date && t.due_date < todayStr() && t.status!=='done';
  const proj = t.project_id ? projById(t.project_id) : null;
  const meta=[];
  if(showProj && proj) meta.push('<span class="chip">'+esc(proj.name)+'</span>');
  if(t.priority===1) meta.push('<span class="chip amber">P1</span>');
  if(t.due_date) meta.push('<span class="small '+(over?'overdue':'muted')+'">'+(over?'overdue · ':'due ')+fmtD(t.due_date)+'</span>');
  if(t.source && t.source!=='manual') meta.push('<span class="chip">'+esc(t.source)+'</span>');
  div.innerHTML = '<span class="box" aria-hidden="true">✓</span><div class="t"><div>'+esc(t.title)+'</div>'+
    (meta.length?'<div class="meta">'+meta.join('')+'</div>':'')+
    (t.notes?'<div class="small muted">'+esc(t.notes)+'</div>':'')+'</div>';
  let busy=false;
  const toggle = async ()=>{
    if(busy) return; busy=true;
    const done = t.status!=='done';
    t.status = done?'done':'todo';
    div.classList.toggle('done', done);
    try{
      await q(sb.from('tasks').update({status:t.status, completed_at: done?new Date().toISOString():null, updated_at:new Date().toISOString()}).eq('id',t.id),'Update task');
      if(done){ S.tasksOpen = S.tasksOpen.filter(x=>x.id!==t.id); toast('Done ✓ — tap again to undo'); }
      else { if(!S.tasksOpen.some(x=>x.id===t.id)) S.tasksOpen.push(t); toast('Back to open'); }
    }catch(e){
      t.status = done?'todo':'done';
      div.classList.toggle('done', t.status==='done');
    }
    busy=false;
  };
  div.onclick = toggle;
  div.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); } });
  return div;
}

// Watch tiles (exercise_min, vo2_max) only appear once Apple Health data exists — latest()==null skips them.
const TILE_ORDER=['sleep_hours','sleep_score','readiness','hrv','resting_hr','steps','deep_sleep','active_cal','exercise_min','vo2_max'];
const TABLE_ORDER=['sleep_hours','sleep_score','readiness','hrv','resting_hr','resp_rate','deep_sleep','rem_sleep','sleep_efficiency','steps','activity_score','active_cal','exercise_min','vo2_max','workout','weight'];
const SPARK_COLORS=['var(--accent)','var(--accent2)','var(--accent3)'];
function sparkline(vals,color){
  vals=vals.filter(v=>v!=null);
  if(vals.length<2) return '<div style="height:32px"></div>';
  const w=120,h=32,pad=3, mn=Math.min(...vals), mx=Math.max(...vals), rng=(mx-mn)||1;
  const step=(w-2*pad)/(vals.length-1);
  const pts=vals.map((v,i)=>[+(pad+i*step).toFixed(1), +(h-pad-((v-mn)/rng)*(h-2*pad)).toFixed(1)]);
  const last=pts[pts.length-1];
  const poly=pts.map(p=>p.join(',')).join(' ');
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;color:'+color+'">'+
    '<polygon points="'+poly+' '+last[0]+','+(h-pad)+' '+pad+','+(h-pad)+'" fill="currentColor" opacity="0.11"/>'+
    '<polyline points="'+poly+'" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/>'+
    '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.3" fill="currentColor"/></svg>';
}

  ]);
  m.innerHTML='';

  // Build date→metric map
  const byDay={};
  for(const l of logs){
    const d=(byDay[l.log_date] ||= {});
    if(l.metric==='workout') d.workout=(d.workout||0)+Number(l.value||0);
    else if(l.metric==='steps'){ if(l.source==='oura' || d.steps==null) d.steps=Math.round(Number(l.value)); }
    else d[l.metric]=Number(l.value);
  }
  const allDays=Object.keys(byDay).sort();
  // Cumulative metrics accrue over the day, so today's value is partial — exclude it from tiles/averages.
  const CUMULATIVE=new Set(['steps','active_cal','activity_score','workout','exercise_min']);
  const daysFor=metric=> CUMULATIVE.has(metric)? allDays.filter(d=>d<today) : allDays;
  const series=(metric,n)=>{ const ds=daysFor(metric).slice(-n); return ds.map(d=>byDay[d][metric]).filter(v=>v!=null); };
  const avg=arr=>arr.length? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const latest=metric=>{ const ds=daysFor(metric); for(let i=ds.length-1;i>=0;i--){ const v=byDay[ds[i]][metric]; if(v!=null) return v; } return null; };
  const hasOura = logs.some(l=>l.source==='oura');

  } else {
    cA.innerHTML+='<div class="empty">Analysis appears once there\'s a week of data. Log sleep and workouts below, or connect a device.</div>';
  }
  m.appendChild(cA);

  if(allDays.length){
    const cT=document.createElement('div'); cT.className='card';
    cT.innerHTML='<h2>Measurements</h2><div class="mtiles"></div>';

  };

      '</table></div>';

    c3.innerHTML='<h2>Recent entries</h2>'+entries.map(e=>'<div class="note"><div class="small muted">'+fmtD(e.entry_date)+(e.mood?' · '+['😞','😕','😐','🙂','😄'][e.mood-1]:'')+'</div>'+(e.prompt?'<div class="small muted" style="font-style:italic">'+esc(e.prompt)+'</div>':'')+(e.content_md?'<div class="body">'+md(e.content_md)+'</div>':'')+'</div>').join('');
    m.appendChild(c3);
  }
}

    '<p style="margin-bottom:6px">• <strong>Voice capture</strong> (mic button) — talk through tasks free-form; Claude parses them into projects every ~2 hours, 8am–8pm.</p>'+
    '<p style="margin-bottom:6px">• <strong>Work orders</strong> — delegated production work runs on your Mac every ~2 hours (9am–7pm), one order at a time, drafts only.</p>'+

// ------- modal & settings -------
function openModal(html){ $('#modal').innerHTML=html; $('#modal-bg').classList.add('on'); }
function closeModal(){
  stopVoice();
  if(livePC && liveLog.some(l=>l.who==='me')){
    const t=liveTranscript(liveLog.slice()); liveLog=[];
    sb.from('voice_captures').insert({transcript:t}).then(()=>{ toast('Captured'); });
  }
  liveCleanup();
  $('#modal-bg').classList.remove('on');
}

// ------- voice capture -------
let recogWanted=false, recogRef=null;
function stopVoice(){
  recogWanted=false;
  if(recogRef){ try{ recogRef.stop(); }catch(e){} recogRef=null; }
  const mb=document.getElementById('mic-big'); if(mb) mb.classList.remove('listening');
}
function basicVoiceModal(){
  openModal('<h3>Voice capture</h3><div class="small muted" style="margin-bottom:6px">Talk through tasks, projects, changes — completely free-form. Claude parses it into the right projects (checks every couple of hours, or ask it to process now).</div>'+
    '<button id="mic-big" aria-label="Start or stop listening"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a4 4 0 0 0 4-4V6a4 4 0 1 0-8 0v5a4 4 0 0 0 4 4z"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3M9 21h6"/></svg></button>'+
    '<div id="mic-status" class="small muted" style="text-align:center; min-height:18px">Tap the mic to start</div>'+
    '<div id="mic-interim" class="small muted" style="font-style:italic; min-height:18px"></div>'+
    '<label class="small muted" style="display:block; margin-top:8px">Transcript (edit freely before saving)</label>'+
    '<textarea id="mic-text" style="min-height:110px" placeholder="Or type here — your keyboard\'s dictation mic works too."></textarea>'+
    '<button class="btn" id="mic-save" style="width:100%; margin-top:12px">Save for processing</button>');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn=$('#mic-big'), st=$('#mic-status'), interim=$('#mic-interim'), ta=$('#mic-text');
  if(!SR){
    st.textContent='Live transcription isn\'t supported in this browser — use your keyboard\'s dictation mic in the box below.';
    micBtn.disabled=true;
  } else {
    micBtn.onclick=()=>{
      if(recogWanted){ stopVoice(); st.textContent='Paused — tap to resume'; return; }
      recogWanted=true; micBtn.classList.add('listening'); st.textContent='Listening… speak freely';
      const r=new SR(); recogRef=r;
      r.continuous=true; r.interimResults=true; r.lang='en-US';
      r.onresult=(e)=>{
        let it='';
        for(let i=e.resultIndex;i<e.results.length;i++){
          const res=e.results[i];
          if(res.isFinal){ const txt=res[0].transcript.trim(); if(txt) ta.value=(ta.value?ta.value.replace(/\s+$/,'')+' ':'')+txt; }
          else it+=res[0].transcript;
        }
        interim.textContent=it;
      };
      r.onerror=(e)=>{
        if(e.error==='not-allowed' || e.error==='service-not-allowed'){
          stopVoice(); st.textContent='Microphone permission denied — allow it in browser settings, or use the keyboard mic.';
        }
      };
      r.onend=()=>{
        interim.textContent='';
        if(recogWanted && recogRef===r){ try{ r.start(); }catch(err){} }
        else if(!recogWanted) micBtn.classList.remove('listening');
      };
      try{ r.start(); }catch(err){ stopVoice(); st.textContent='Could not start listening: '+err.message; }
    };
  }
  $('#mic-save').onclick=async ()=>{
    const v=ta.value.trim(); if(!v){ toast('Nothing to save yet'); return; }
    stopVoice();
    await q(sb.from('voice_captures').insert({transcript:v}),'Save capture');
    closeModal(); toast('Captured — Claude will parse this into your projects');
    if(S.view==='today') render();
  };
}
// ------- live voice (OpenAI Realtime as capture interface; Claude does all processing) -------
let livePC=null, liveMic=null, liveDC=null, liveLog=[], liveTimer=null, liveAudio=null;
function liveCleanup(){
  if(liveTimer){ clearTimeout(liveTimer); liveTimer=null; }
  if(liveDC){ try{ liveDC.close(); }catch(e){} liveDC=null; }
  if(livePC){ try{ livePC.close(); }catch(e){} livePC=null; }
  if(liveMic){ liveMic.getTracks().forEach(t=>t.stop()); liveMic=null; }
  if(liveAudio){ liveAudio.srcObject=null; liveAudio=null; }
}
function renderLiveLog(){
  const el=document.getElementById('mic-live-log'); if(!el) return;
  el.innerHTML=liveLog.map(l=>'<div style="margin-bottom:5px"><strong>'+(l.who==='me'?'You':'Capture')+':</strong> '+esc(l.text)+'</div>').join('');
  el.scrollTop=el.scrollHeight;
}
function liveTranscript(entries){
  return entries.map(l=>(l.who==='me'?'Me: ':'Capture assistant: ')+l.text).join('\n');
}
async function saveLive(){
  const entries=liveLog.slice(); liveLog=[];
  liveCleanup();
  if(!entries.some(l=>l.who==='me')){ closeModal(); toast('Nothing captured'); return; }
  await q(sb.from('voice_captures').insert({transcript:liveTranscript(entries)}),'Save capture');
  closeModal(); toast('Captured — Claude will parse this into your projects');
  if(S.view==='today') render();
}
async function startLive(){
  const st=$('#mic-status'), micBtn=$('#mic-big');
  try{
    st.textContent='Connecting…';
    const sess=await sb.auth.getSession();
    const at=sess.data && sess.data.session ? sess.data.session.access_token : null;
    if(!at) throw new Error('not signed in');
    const r=await fetch(SB_URL+'/functions/v1/voice-session', {method:'POST', headers:{Authorization:'Bearer '+at}});
    const js=await r.json();
    if(!js.client_secret) throw new Error(js.error||'session mint failed');
    liveMic=await navigator.mediaDevices.getUserMedia({audio:true});
    livePC=new RTCPeerConnection();
    liveAudio=new Audio(); liveAudio.autoplay=true;
    livePC.ontrack=e=>{ liveAudio.srcObject=e.streams[0]; };
    livePC.addTrack(liveMic.getTracks()[0], liveMic);
    liveDC=livePC.createDataChannel('oai-events');
    liveDC.onmessage=ev=>{
      let d; try{ d=JSON.parse(ev.data); }catch(err){ return; }
      if(d.type==='conversation.item.input_audio_transcription.completed' && d.transcript){ liveLog.push({who:'me', text:d.transcript.trim()}); renderLiveLog(); }
      else if((d.type==='response.output_audio_transcript.done'||d.type==='response.audio_transcript.done') && d.transcript){ liveLog.push({who:'cap', text:d.transcript.trim()}); renderLiveLog(); }
    };
    const offer=await livePC.createOffer();
    await livePC.setLocalDescription(offer);
    const sr=await fetch('https://api.openai.com/v1/realtime/calls?model='+(js.model||'gpt-realtime-mini'), {method:'POST', headers:{Authorization:'Bearer '+js.client_secret, 'Content-Type':'application/sdp'}, body:offer.sdp});
    if(!sr.ok) throw new Error('call setup failed ('+sr.status+')');
    const answer=await sr.text();
    await livePC.setRemoteDescription({type:'answer', sdp:answer});
    micBtn.classList.add('listening');
    st.textContent='Live — talk it through. Say you\'re done when finished, then tap End & save.';
    $('#mic-save').style.display='block';
    liveTimer=setTimeout(()=>{ toast('Session auto-ended at 10 min'); saveLive(); }, 600000);
  }catch(e){
    liveCleanup();
    if(st) st.textContent='Live session unavailable ('+(e.message||e)+') — opening basic dictation.';
    setTimeout(()=>basicVoiceModal(), 1100);
  }
}
function voiceModal(){
  liveLog=[]; liveCleanup();
  openModal('<h3>Voice capture</h3>'+
    '<div class="small muted" style="margin-bottom:6px">Live session — talk through tasks free-form; it acknowledges and asks quick clarifying questions. Everything goes to Claude for processing when you end.</div>'+
    '<button id="mic-big" aria-label="Start live session"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a4 4 0 0 0 4-4V6a4 4 0 1 0-8 0v5a4 4 0 0 0 4 4z"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3M9 21h6"/></svg></button>'+
    '<div id="mic-status" class="small muted" style="text-align:center; min-height:18px">Tap the mic to go live</div>'+
    '<div id="mic-live-log" class="small" style="max-height:180px; overflow-y:auto; margin-top:8px"></div>'+
    '<button class="btn" id="mic-save" style="width:100%; margin-top:12px; display:none">End & save</button>'+
    '<button class="small" id="mic-basic" style="color:var(--accent); display:block; margin:10px auto 0">Use basic dictation instead</button>');
  $('#mic-big').onclick=()=>{ if(!livePC) startLive(); };
  $('#mic-save').onclick=saveLive;
  $('#mic-basic').onclick=()=>{ liveCleanup(); liveLog=[]; basicVoiceModal(); };
}
$('#fab').onclick=voiceModal;
$('#modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') closeModal(); });
function vapidKey(){
  const s='BAfG6N8rT47W7LKmQ_4HOHS0DzL45BxdkS2BgnbDiLrjdZMRGnmLkWAqCZAvgqxaSQox-8JxmuUjwq_2DJB33mc';
  const b=atob(s.replace(/-/g,'+').replace(/_/g,'/').padEnd(Math.ceil(s.length/4)*4,'='));
  return Uint8Array.from(b, c=>c.charCodeAt(0));
}
$('#gear').onclick=()=>{
  openModal('<h3>Settings</h3>'+
    '<label>Notifications</label><div id="st-push-status" class="small muted" style="margin-bottom:8px"></div>'+
    '<button class="btn small" id="st-push">Enable notifications on this device</button>'+
    '<hr class="sep"><label>New password</label><input id="st-pw" type="password" autocomplete="new-password"><button class="btn small" id="st-pw-go" style="margin-top:10px">Change password</button>'+
    '<hr class="sep"><button class="btn ghost" id="st-out" style="width:100%">Sign out</button>');
  const pstat=$('#st-push-status');
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
  const isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if(!('Notification' in window) || !('PushManager' in window)){
    pstat.textContent = isiOS ? 'On iPhone: add RaoOS to your Home Screen first, then enable from the installed app.' : 'Not supported in this browser.';
    $('#st-push').disabled=true;
  } else if(isiOS && !isStandalone){
    pstat.textContent='On iPhone: add RaoOS to your Home Screen first, then enable from the installed app.';
  } else if(Notification.permission==='granted'){
    pstat.textContent='Enabled on this device ✓ — tap again to re-sync if needed.';
  } else {
    pstat.textContent='Morning brief alert (~6:50 AM) and an evening gratitude nudge (9:30 PM, only if you haven\'t logged).';
  }
  $('#st-push').onclick=async ()=>{
    try{
      const reg = await navigator.serviceWorker.register('sw.js');
      await navigator.serviceWorker.ready;
      const perm = await Notification.requestPermission();
      if(perm!=='granted'){ pstat.textContent='Permission was not granted — enable it in iOS Settings › Notifications › RaoOS.'; return; }
      const sub = await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:vapidKey()});
      const sj = sub.toJSON();
      await q(sb.from('push_subscriptions').upsert({endpoint:sj.endpoint, keys:sj.keys}, {onConflict:'endpoint'}),'Save subscription');
      pstat.textContent='Enabled on this device ✓';
      toast('Notifications on ✓');
    }catch(e){ pstat.textContent='Could not enable: '+(e.message||e); }
  };
  $('#st-pw-go').onclick=async ()=>{
    const pw=$('#st-pw').value; if(pw.length<8){ toast('Use at least 8 characters'); return; }
    const {error}=await sb.auth.updateUser({password:pw});
    if(error) toast('Failed: '+error.message); else { toast('Password changed'); closeModal(); }
  };
  $('#st-out').onclick=async ()=>{ await sb.auth.signOut(); location.reload(); };
};

function setHeader(){
  const now=new Date();
  $('#hdr-date').textContent = now.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'});
}
async function start(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    $('#login').style.display='grid';
    $('#li-btn').onclick=async ()=>{
      $('#li-btn').disabled=true; $('#li-err').textContent='';

      $('#li-btn').disabled=false;
      if(error){ $('#li-err').textContent=error.message; return; }

    return;
  }
  $('#login').style.display='none';

  setHeader(); buildNav();
  await loadCore();
  const h=location.hash.replace('#','');
  setTab(TABS.some(t=>t[0]===h)?h:'today');
}
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
start();
