<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F4F5F3">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0F151C">
<title>Rao Life OS</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F5F3; --surface:#FFFFFF; --surface2:#EDEFEC; --ink:#1C2733; --muted:#5C6B7A;
  --line:#E0E4E1; --accent:#0E7A6F; --accent-soft:#E3F0EE; --on-accent:#FFFFFF;
  --amber:#B45309; --amber-soft:#F6EADB; --good:#3E8E5A; --bad:#B03A2E;
  --shadow:0 1px 2px rgba(28,39,51,.06), 0 4px 16px rgba(28,39,51,.05);
  --radius:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0F151C; --surface:#171F28; --surface2:#1F2935; --ink:#E6EAEE; --muted:#93A1AE;
    --line:#26303A; --accent:#3AB3A5; --accent-soft:#153029; --on-accent:#08211D;
    --amber:#E5A158; --amber-soft:#33261A; --good:#5CB380; --bad:#D9705F;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box; margin:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'IBM Plex Sans',-apple-system,system-ui,sans-serif;
  font-size:15.5px; line-height:1.5; min-height:100dvh;
}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0}
input,select,textarea{
  font:inherit; color:var(--ink); background:var(--surface); border:1px solid var(--line);
  border-radius:10px; padding:9px 12px; width:100%;
}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
textarea{resize:vertical; min-height:84px}
a{color:var(--accent)}
.mono{font-family:'IBM Plex Mono',monospace}
.serif{font-family:'IBM Plex Serif',Georgia,serif}

/* Shell */
#shell{display:none; min-height:100dvh}
#shell.on{display:block}
.wrap{max-width:960px; margin:0 auto; padding:0 16px 96px}
@media(min-width:900px){
  .wrap{padding-left:196px; padding-bottom:32px}
}
header.app{padding:calc(14px + env(safe-area-inset-top)) 0 6px}
header.app .kicker{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
header.app h1{font-size:24px; font-weight:700; letter-spacing:-.01em; display:flex; align-items:center; gap:10px}
header.app .gear{margin-left:auto; color:var(--muted); padding:6px}

/* Nav */
nav#nav{
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:var(--surface); border-top:1px solid var(--line);
  display:flex; justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav#nav button{
  display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:10.5px; color:var(--muted); min-width:52px; padding:4px 2px; border-radius:10px;
}
nav#nav button.on{color:var(--accent); font-weight:600}
nav#nav svg{width:22px; height:22px}
@media(min-width:900px){
  nav#nav{
    top:0; bottom:0; right:auto; width:180px; flex-direction:column; justify-content:flex-start;
    gap:4px; padding:24px 12px; border-top:none; border-right:1px solid var(--line);
  }
  nav#nav button{flex-direction:row; gap:10px; font-size:14px; padding:10px 12px; width:100%; justify-content:flex-start}
  nav#nav .brand{display:block !important; font-weight:700; font-size:16px; padding:0 12px 18px; color:var(--ink)}
}
nav#nav .brand{display:none}

/* Cards & bits */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin:14px 0}
.card h2{font-size:13px; font-family:'IBM Plex Mono',monospace; font-weight:500; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:8px}
.card h2 .spacer{margin-left:auto}
.row{display:flex; align-items:center; gap:10px}
.chip{font-size:11.5px; font-family:'IBM Plex Mono',monospace; padding:2px 8px; border-radius:999px; background:var(--surface2); color:var(--muted); white-space:nowrap}
.chip.accent{background:var(--accent-soft); color:var(--accent)}
.chip.amber{background:var(--amber-soft); color:var(--amber)}
.btn{background:var(--accent); color:var(--on-accent); font-weight:600; border-radius:10px; padding:9px 16px}
.btn.ghost{background:var(--surface2); color:var(--ink); font-weight:500}
.btn.small{padding:6px 12px; font-size:13.5px}
.btn:disabled{opacity:.5}
.muted{color:var(--muted)}
.small{font-size:13px}
.empty{color:var(--muted); font-size:14px; padding:8px 0}
hr.sep{border:none; border-top:1px solid var(--line); margin:12px 0}

/* Tasks */
.task{display:flex; align-items:flex-start; gap:11px; padding:9px 0; border-bottom:1px solid var(--line)}
.task:last-child{border-bottom:none}
.task .box{
  flex:none; width:21px; height:21px; margin-top:2px; border:2px solid var(--muted);
  border-radius:7px; display:grid; place-items:center; color:transparent; transition:all .15s;
}
.task.done .box{background:var(--good); border-color:var(--good); color:#fff}
.task.done .t{text-decoration:line-through; color:var(--muted)}
.task .t{flex:1; min-width:0}
.task .meta{display:flex; gap:6px; flex-wrap:wrap; margin-top:2px}
.task .p1{color:var(--amber); font-weight:600}
.overdue{color:var(--bad); font-weight:600}

/* Brief */
.brief{font-family:'IBM Plex Serif',Georgia,serif; font-size:16px; line-height:1.65}
.brief h3{font-family:'IBM Plex Sans',sans-serif; font-size:15px; margin:14px 0 4px}
.brief h3:first-child{margin-top:0}
.brief ul{padding-left:20px; margin:4px 0}
.brief p{margin:8px 0}
.sched{display:grid; grid-template-columns:auto 1fr; gap:4px 12px}
.sched .tm{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--muted); padding-top:2px; white-space:nowrap}

/* Login */
#login{min-height:100dvh; display:grid; place-items:center; padding:20px}
#login .card{max-width:380px; width:100%; margin:0}
#login h1{font-size:26px; margin-bottom:2px}
#login .sub{color:var(--muted); margin-bottom:18px}
#login label{font-size:13px; color:var(--muted); display:block; margin:12px 0 4px}

/* Modal */
#modal-bg{position:fixed; inset:0; background:rgba(10,15,20,.45); z-index:60; display:none; align-items:flex-end; justify-content:center}
@media(min-width:640px){#modal-bg{align-items:center}}
#modal-bg.on{display:flex}
#modal{background:var(--surface); border-radius:18px 18px 0 0; width:100%; max-width:520px; max-height:88dvh; overflow-y:auto; padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
@media(min-width:640px){#modal{border-radius:18px}}
#modal h3{margin-bottom:12px}
#modal label{font-size:13px; color:var(--muted); display:block; margin:12px 0 4px}

/* Toast */
#toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(84px + env(safe-area-inset-bottom)); background:var(--ink); color:var(--bg); padding:10px 18px; border-radius:999px; font-size:14px; z-index:80; opacity:0; transition:opacity .25s; pointer-events:none; max-width:88vw; text-align:center}
#toast.on{opacity:1}
@media(min-width:900px){#toast{bottom:32px}}

/* Mood + breathing */
.mood{display:flex; gap:8px}
.mood button{width:38px; height:38px; border-radius:50%; background:var(--surface2); font-size:17px; display:grid; place-items:center; border:2px solid transparent}
.mood button.on{border-color:var(--accent); background:var(--accent-soft)}
#breath-circle{
  width:140px; height:140px; border-radius:50%; margin:14px auto; display:grid; place-items:center;
  background:var(--accent-soft); color:var(--accent); font-weight:600; transition:transform 3.8s ease-in-out;
}
@media (prefers-reduced-motion: reduce){ #breath-circle{transition:none} }

.goal{padding:10px 0; border-bottom:1px solid var(--line)}
.goal:last-child{border-bottom:none}
.goal .head{display:flex; gap:8px; align-items:baseline; cursor:pointer}
.goal .edit{display:none; margin-top:10px}
.goal.open .edit{display:block}

.proj{display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--line); cursor:pointer; width:100%; text-align:left}
.proj:last-child{border-bottom:none}
.proj .dot{width:10px; height:10px; border-radius:50%; flex:none}
.proj .n{flex:1; font-weight:500}

.note{padding:12px 0; border-bottom:1px solid var(--line)}
.note:last-child{border-bottom:none}
.note.new{border-left:3px solid var(--accent); padding-left:10px}
.note .body{font-family:'IBM Plex Serif',Georgia,serif; line-height:1.6}
.note .body ul{padding-left:20px}

.qbtns{display:flex; gap:8px; flex-wrap:wrap}
.addrow{display:flex; gap:8px; margin-top:10px}
.addrow input{flex:1}
.addrow select{width:auto; max-width:40%}

.onb-q{margin-bottom:16px}
.onb-q .q{font-weight:600; margin-bottom:6px}

table.h7{width:100%; border-collapse:collapse; font-size:13.5px; font-variant-numeric:tabular-nums}
table.h7 th{font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); text-align:left; padding:4px 8px 4px 0; font-weight:500}
table.h7 td{padding:5px 8px 5px 0; border-top:1px solid var(--line)}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>Life OS</h1>
    <div class="sub">Your projects, health, family & focus — managed with Claude.</div>
    <label for="li-email">Email</label>
    <input id="li-email" type="email" value="rhetorrao@gmail.com" autocomplete="username">
    <label for="li-pass">Password</label>
    <input id="li-pass" type="password" autocomplete="current-password">
    <div id="li-err" class="small" style="color:var(--bad); margin-top:8px"></div>
    <button class="btn" id="li-btn" style="width:100%; margin-top:16px">Sign in</button>
  </div>
</div>

<div id="shell">
  <nav id="nav">
    <div class="brand">Life OS</div>
  </nav>
  <div class="wrap">
    <header class="app">
      <div class="kicker" id="hdr-date"></div>
      <h1><span id="hdr-title">Today</span>
        <button class="gear" id="gear" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </h1>
    </header>
    <main id="main"></main>
  </div>
</div>

<div id="modal-bg"><div id="modal"></div></div>
<div id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://nfetfnkbsulvxkgniwrj.supabase.co';
const SB_KEY = 'sb_publishable_71CPB61Y7QTNlumHRq8mRg_XHQNXquZ';
const sb = createClient(SB_URL, SB_KEY);

const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr = () => new Date().toLocaleDateString('en-CA');
const fmtD = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
let toastTimer;
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('on'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'), 2600); }

// Minimal markdown renderer (escapes first; supports #/##/###, **bold**, *em*, - lists)
function md(src){
  if(!src) return '';
  const inline = s => esc(s)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:!?]|$)/g,'$1<em>$2</em>');
  const lines = src.split(/\r?\n/); let out=[], list=false, para=[];
  const flushP = () => { if(para.length){ out.push('<p>'+para.join('<br>')+'</p>'); para=[]; } };
  const flushL = () => { if(list){ out.push('</ul>'); list=false; } };
  for(const raw of lines){
    const l = raw.trimEnd();
    const h = l.match(/^(#{1,4})\s+(.*)/);
    if(h){ flushP(); flushL(); out.push('<h3>'+inline(h[2])+'</h3>'); continue; }
    if(/^[-*]\s+/.test(l)){ flushP(); if(!list){ out.push('<ul>'); list=true; } out.push('<li>'+inline(l.replace(/^[-*]\s+/,''))+'</li>'); continue; }
    if(l===''){ flushP(); flushL(); continue; }
    para.push(inline(l));
  }
  flushP(); flushL();
  return out.join('');
}

async function q(promise, label){
  const {data, error} = await promise;
  if(error){ console.error(label, error); toast((label||'Request') + ' failed: ' + error.message); throw error; }
  return data;
}

// ------- state -------
const S = { areas:[], projects:[], tasksOpen:[], profile:{}, view:'today', projDetail:null };

async function loadCore(){
  const [areas, projects, tasks, prof] = await Promise.all([
    q(sb.from('life_areas').select('*').order('sort_order'), 'Areas'),
    q(sb.from('projects').select('*').order('sort_order'), 'Projects'),
    q(sb.from('tasks').select('*').in('status',['todo','doing']).order('due_date',{ascending:true, nullsFirst:false}), 'Tasks'),
    q(sb.from('user_profile').select('*'), 'Profile'),
  ]);
  S.areas=areas; S.projects=projects; S.tasksOpen=tasks;
  S.profile = Object.fromEntries(prof.map(r=>[r.key, r.value]));
}
const areaById = id => S.areas.find(a=>a.id===id);
const projById = id => S.projects.find(p=>p.id===id);

// ------- nav -------
const TABS = [
  ['today','Today','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/></svg>'],
  ['projects','Projects','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>'],
  ['goals','Goals','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>'],
  ['health','Health','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 8.6a5 5 0 0 0-8.1-3.9L12 5.3l-.7-.6A5 5 0 0 0 3.2 8.6c0 5 8.8 10.4 8.8 10.4s8.8-5.4 8.8-10.4z"/><path d="M3.5 12h4l1.8-3 2.7 6 1.8-3h4.2"/></svg>'],
  ['reflect','Reflect','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>'],
  ['coach','Coach','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 8.9 8.9 0 0 1-3.5-.7L3 21l1.8-4.4A8.4 8.4 0 1 1 21 11.5z"/></svg>'],
];
function buildNav(){
  const nav=$('#nav');
  for(const [id,label,icon] of TABS){
    const b=document.createElement('button');
    b.innerHTML = icon + '<span>'+label+'</span>';
    b.onclick = ()=>{ location.hash = id; };
    b.dataset.tab=id;
    nav.appendChild(b);
  }
}
function setTab(id){
  S.view=id; S.projDetail=null;
  document.querySelectorAll('#nav button[data-tab]').forEach(b=>b.classList.toggle('on', b.dataset.tab===id));
  $('#hdr-title').textContent = TABS.find(t=>t[0]===id)?.[1] || 'Today';
  render();
}
window.addEventListener('hashchange', ()=>{ const h=location.hash.replace('#',''); if(TABS.some(t=>t[0]===h)) setTab(h); });

// ------- task bits -------
function taskRow(t, showProj=true){
  const div=document.createElement('div');
  div.className='task'+(t.status==='done'?' done':'');
  const over = t.due_date && t.due_date < todayStr() && t.status!=='done';
  const proj = t.project_id ? projById(t.project_id) : null;
  const meta=[];
  if(showProj && proj) meta.push('<span class="chip">'+esc(proj.name)+'</span>');
  if(t.priority===1) meta.push('<span class="chip amber">P1</span>');
  if(t.due_date) meta.push('<span class="small '+(over?'overdue':'muted')+'">'+(over?'overdue · ':'due ')+fmtD(t.due_date)+'</span>');
  if(t.source && t.source!=='manual') meta.push('<span class="chip">'+esc(t.source)+'</span>');
  div.innerHTML = '<button class="box" aria-label="Toggle done">✓</button><div class="t"><div>'+esc(t.title)+'</div>'+
    (meta.length?'<div class="meta">'+meta.join('')+'</div>':'')+
    (t.notes?'<div class="small muted">'+esc(t.notes)+'</div>':'')+'</div>';
  div.querySelector('.box').onclick = async ()=>{
    const done = t.status!=='done';
    t.status = done?'done':'todo';
    div.classList.toggle('done', done);
    await q(sb.from('tasks').update({status:t.status, completed_at: done?new Date().toISOString():null, updated_at:new Date().toISOString()}).eq('id',t.id),'Update task');
    S.tasksOpen = S.tasksOpen.filter(x=>x.id!==t.id || x.status!=='done');
    if(done) toast('Done ✓');
  };
  return div;
}
async function addTask(title, projectId, due, priority=2){
  const t = await q(sb.from('tasks').insert({title, project_id:projectId||null, due_date:due||null, scheduled_for:due||null, priority}).select().single(),'Add task');
  S.tasksOpen.push(t);
  return t;
}
function projSelect(id, selected){
  let o = '<select id="'+id+'"><option value="">No project</option>';
  for(const p of S.projects.filter(p=>p.status==='active')) o += '<option value="'+p.id+'"'+(selected===p.id?' selected':'')+'>'+esc(p.name)+'</option>';
  return o+'</select>';
}

// ------- views -------
async function render(){
  const m=$('#main'); m.innerHTML='<div class="empty">Loading…</div>';
  try{
    if(S.view==='today') await vToday(m);
    else if(S.view==='projects') await (S.projDetail? vProject(m, S.projDetail) : vProjects(m));
    else if(S.view==='goals') await vGoals(m);
    else if(S.view==='health') await vHealth(m);
    else if(S.view==='reflect') await vReflect(m);
    else if(S.view==='coach') await vCoach(m);
  }catch(e){ m.innerHTML='<div class="card"><div class="empty">Something went wrong loading this view. Pull to refresh or try again.</div></div>'; }
}

// TODAY
async function vToday(m){
  const results0 = await Promise.all([
    q(sb.from('daily_briefs').select('*').order('brief_date',{ascending:false}).limit(1),'Brief'),
    q(sb.from('planning_notes').select('*').neq('status','archived').order('created_at',{ascending:false}).limit(5),'Notes'),
  ]);
  const briefs=results0[0], pnotes=results0[1];
  const brief = briefs[0];
  const today = todayStr();
  m.innerHTML='';

  // Brief
  const c1=document.createElement('div'); c1.className='card';
  const stale = brief && brief.brief_date !== today;
  c1.innerHTML = '<h2>Daily brief'+(brief?'<span class="spacer"></span><span class="chip'+(stale?'':' accent')+'">'+fmtD(brief.brief_date)+'</span>':'')+'</h2>'+
    (brief? '<div class="brief">'+md(brief.content_md)+'</div>'
          : '<div class="empty">No brief yet. Your first brief arrives at 6:00 AM (your Mac needs to be awake with the Claude app open) — or ask Claude to generate one now.</div>');
  m.appendChild(c1);

  // Schedule
  const sched = brief?.data?.schedule;
  if(Array.isArray(sched) && sched.length){
    const c2=document.createElement('div'); c2.className='card';

  };

  $('#rf-go').onclick=async ()=>{
    const text=$('#rf-text').value.trim();
    if(!text && !mood){ toast('Write something or pick a mood'); return; }
    await q(sb.from('reflections').insert({prompt:PROMPTS[dayIdx], content_md:text||null, mood}),'Save'); render(); toast('Saved');
  };

  const c2=document.createElement('div'); c2.className='card';
  c2.innerHTML='<h2>One-minute breather</h2><div class="small muted">Box breathing — in 4, hold 4, out 4, hold 4.</div>'+
    '<div id="breath-circle">Start</div><button class="btn ghost small" id="br-go" style="display:block; margin:0 auto">Begin</button>';
  m.appendChild(c2);
  let breathing=false;
  $('#br-go').onclick=async ()=>{
    if(breathing) return; breathing=true;
    const c=$('#breath-circle'); const phases=[['Breathe in',1.35],['Hold',1.35],['Breathe out',1],['Hold',1]];
    for(let cycle=0; cycle<4 && breathing; cycle++){
      for(const [label,scale] of phases){
        if(!document.getElementById('breath-circle')) { breathing=false; return; }
        c.textContent=label; c.style.transform='scale('+scale+')';
        await new Promise(r=>setTimeout(r,4000));
      }
    }
    if(document.getElementById('breath-circle')){ c.textContent='Done ✓'; c.style.transform='scale(1)'; }
    breathing=false;
  };

  if(entries.length){
    const c3=document.createElement('div'); c3.className='card';
    c3.innerHTML='<h2>Recent entries</h2>'+entries.map(e=>'<div class="note"><div class="small muted">'+fmtD(e.entry_date)+(e.mood?' · '+['😞','😕','😐','🙂','😄'][e.mood-1]:'')+'</div>'+(e.prompt?'<div class="small muted" style="font-style:italic">'+esc(e.prompt)+'</div>':'')+(e.content_md?'<div class="body">'+md(e.content_md)+'</div>':'')+'</div>').join('');
    m.appendChild(c3);
  }
}

// COACH
async function vCoach(m){
  const [notes, inbox] = await Promise.all([
    q(sb.from('coach_notes').select('*').neq('status','dismissed').order('created_at',{ascending:false}).limit(20),'Coach notes'),
    q(sb.from('claude_inbox').select('*').order('created_at',{ascending:false}).limit(10),'Inbox'),
  ]);
  m.innerHTML='';

  const c1=document.createElement('div'); c1.className='card';
  c1.innerHTML='<h2>Message Claude</h2><div class="small muted" style="margin-bottom:8px">Ask for advice, delegate a task, or leave context. Claude reads these during your morning brief (or when you chat directly).</div>'+
    '<textarea id="ci-text" placeholder="e.g. Help me figure out how to sequence the SCPS modules vs. the book deadline…"></textarea>'+
    '<button class="btn small" id="ci-go" style="margin-top:10px">Send to Claude</button>';
  m.appendChild(c1);
  $('#ci-go').onclick=async ()=>{
    const v=$('#ci-text').value.trim(); if(!v) return;
    await q(sb.from('claude_inbox').insert({message:v}),'Send'); render(); toast('Sent — Claude will pick this up');
  };

  if(inbox.length){
    const c2=document.createElement('div'); c2.className='card';
    c2.innerHTML='<h2>Your messages</h2>'+inbox.map(i=>'<div class="note"><div>'+esc(i.message)+'</div>'+
      (i.response?'<div class="body" style="margin-top:6px; padding-left:10px; border-left:3px solid var(--accent)">'+md(i.response)+'</div>':'<div class="small muted" style="margin-top:4px">'+(i.status==='new'?'Waiting for Claude':'Seen')+'</div>')+
      '<div class="small muted">'+fmtD(i.created_at.slice(0,10))+'</div></div>').join('');
    m.appendChild(c2);
  }

  const c3=document.createElement('div'); c3.className='card';
  c3.innerHTML='<h2>Coaching notes</h2>';
  if(!notes.length) c3.innerHTML+='<div class="empty">Coaching appears here after your first daily brief and weekly review.</div>';
  for(const n of notes){
    const p=n.project_id?projById(n.project_id):null;
    const d=document.createElement('div'); d.className='note'+(n.status==='new'?' new':'');
    d.innerHTML=(n.title?'<strong>'+esc(n.title)+'</strong> ':'')+(p?'<span class="chip">'+esc(p.name)+'</span>':'<span class="chip">'+esc(n.scope)+'</span>')+
      '<div class="body">'+md(n.note_md)+'</div><div class="row" style="margin-top:4px"><span class="small muted">'+fmtD(n.created_at.slice(0,10))+'</span>'+
      (n.status==='new'?'<button class="small" style="color:var(--accent); margin-left:auto">Mark read</button>':'')+'</div>';
    const btn=d.querySelector('button');
    if(btn) btn.onclick=async ()=>{ await q(sb.from('coach_notes').update({status:'read'}).eq('id',n.id),'Update'); n.status='read'; d.classList.remove('new'); btn.remove(); };
    c3.appendChild(d);
  }
  m.appendChild(c3);

  const c4=document.createElement('div'); c4.className='card';
  c4.innerHTML='<h2>How this works</h2><div class="small">'+
    '<p style="margin-bottom:6px">• <strong>6:00 AM daily</strong> — Claude reads your Gmail, calendars, tasks, and health logs, then writes your brief and coaching here.</p>'+
    '<p style="margin-bottom:6px">• <strong>Sunday 5:00 PM</strong> — weekly review: project progress, what to adjust, plan for the week.</p>'+
    '<p style="margin-bottom:6px">• Scheduled runs need your Mac awake with the Claude app open; otherwise they run at next launch.</p>'+
    '<p style="margin-bottom:6px">• <strong>Notes for planning</strong> (Today tab) feed the next brief and weekly review — commentary in, adjusted plan out.</p>'+
    '<p>• You can also just chat with Claude anytime — it manages this same database.</p></div>';
  m.appendChild(c4);
}

// ------- modal & settings -------
function openModal(html){ $('#modal').innerHTML=html; $('#modal-bg').classList.add('on'); }
function closeModal(){ $('#modal-bg').classList.remove('on'); }
$('#modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') closeModal(); });
$('#gear').onclick=()=>{
  openModal('<h3>Settings</h3><label>New password</label><input id="st-pw" type="password" autocomplete="new-password"><button class="btn small" id="st-pw-go" style="margin-top:10px">Change password</button><hr class="sep"><button class="btn ghost" id="st-out" style="width:100%">Sign out</button>');
  $('#st-pw-go').onclick=async ()=>{
    const pw=$('#st-pw').value; if(pw.length<8){ toast('Use at least 8 characters'); return; }
    const {error}=await sb.auth.updateUser({password:pw});
    if(error) toast('Failed: '+error.message); else { toast('Password changed'); closeModal(); }
  };
  $('#st-out').onclick=async ()=>{ await sb.auth.signOut(); location.reload(); };
};

// ------- boot -------
function setHeader(){
  const now=new Date();
  $('#hdr-date').textContent = now.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'});
}
async function start(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    $('#login').style.display='grid';
    $('#li-btn').onclick=async ()=>{
      $('#li-btn').disabled=true; $('#li-err').textContent='';
      const {error}=await sb.auth.signInWithPassword({email:$('#li-email').value.trim(), password:$('#li-pass').value});
      $('#li-btn').disabled=false;
      if(error){ $('#li-err').textContent=error.message; return; }
      location.reload();
    };
    $('#li-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#li-btn').click(); });
    return;
  }
  $('#login').style.display='none';
  $('#shell').classList.add('on');
  setHeader(); buildNav();
  await loadCore();
  const h=location.hash.replace('#','');
  setTab(TABS.some(t=>t[0]===h)?h:'today');
}
start();
</script>
